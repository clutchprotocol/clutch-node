# Clutch Protocol - Node development stack
# Nodes only. For full stack (API, demo app, Grafana, Prometheus, Seq) use clutch-deploy.
services:
  node1:
    image: ghcr.io/clutchprotocol/clutch-node:latest
    container_name: clutch-node-container-node1
    networks:
      - clutch-network
    ports:
      - "8081:8081"
      - "4001:4001"
      - "3001:3001"
    volumes:
      - ./config:/app/config:ro
    command: ["--env", "node1"]

  node2:
    image: ghcr.io/clutchprotocol/clutch-node:latest
    container_name: clutch-node-container-node2
    depends_on:
      - node1
    networks:
      - clutch-network
    ports:
      - "8082:8082"
      - "4002:4002"
      - "3002:3002"
    volumes:
      - ./config:/app/config:ro
    command: ["--env", "node2"]

  node3:
    image: ghcr.io/clutchprotocol/clutch-node:latest
    container_name: clutch-node-container-node3
    depends_on:
      - node1
    networks:
      - clutch-network
    ports:
      - "8083:8083"
      - "4003:4003"
      - "3003:3003"
    volumes:
      - ./config:/app/config:ro
    command: ["--env", "node3"]

networks:
  clutch-network:
    driver: bridge
